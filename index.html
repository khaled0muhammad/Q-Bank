<script src="questions_data.js"></script>

  <script>
    const LS_KEY = 'obg_progress_v3';
    let deck = [], idx = 0, shuffleMode = true, filterLecture = null, filterSource = '';
    let mcqAnswers = {}, sessionCorrect = 0, sessionWrong = 0, syncTimeout = null;
    let safeAllQuestions = [];

    window.initAppAfterLogin = async function() {
        safeAllQuestions = typeof ALL_QUESTIONS !== 'undefined' ? ALL_QUESTIONS : [];
        if (safeAllQuestions.length > 0) {
            document.getElementById('sb-total-count').textContent = `${safeAllQuestions.length} MCQs`;
        }

        let data = null;
        
        // Try Firebase First
        if (window._loadFromFirebase) {
            data = await window._loadFromFirebase();
        }
        
        // Fallback to LocalStorage if Firebase is empty/fails
        if (!data) {
            try {
                const raw = localStorage.getItem(LS_KEY);
                if (raw) data = JSON.parse(raw);
            } catch(e) { console.error("Local load failed", e); }
        }
        
        if (data) {
            mcqAnswers = data.mcqAnswers || {};
            filterLecture = data.filterLecture || null;
            filterSource = data.filterSource || '';
            shuffleMode = data.shuffleMode !== undefined ? data.shuffleMode : true;
            idx = data.idx || 0;
            
            document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === filterSource));
            document.querySelectorAll('[data-order]').forEach(b => b.classList.toggle('active', b.dataset.order === (shuffleMode ? 'random' : 'sequential')));
            const shuffleBtn = document.getElementById('btn-shuffle');
            shuffleBtn.classList.toggle('shuffle-on', shuffleMode);
            shuffleBtn.textContent = shuffleMode ? '⇌ Shuffle ON' : '⇌ Shuffle OFF';
        }

        buildSidebar();
        deck = buildDeck();
        idx = Math.min(idx, Math.max(0, deck.length - 1));
        
        updateTitle(); updateMeta(); renderCard(); updateNav(); recalculateSessionScore();
    };

    function recalculateSessionScore() {
        sessionCorrect = 0; sessionWrong = 0;
        for (const [id, ans] of Object.entries(mcqAnswers)) {
            const q = safeAllQuestions.find(x => x.id === id);
            if (q) { if (ans === q.ans) sessionCorrect++; else sessionWrong++; }
        }
        updateScore();
    }

    function sourceGroup(src) {
        const s = String(src || '').toLowerCase();
        if (s.includes('new formative')) return 'New Formatives';
        if (s.includes('old formative')) return 'Old Formatives';
        if (s.includes('previous') || s.includes('mu-med')) return 'Previous Exams';
        return '';
    }

    function sourceLabel(src) {
        const s = String(src || '').toLowerCase();
        if (s.includes('new formative')) return 'New Form.';
        if (s.includes('old formative')) return 'Old Form.';
        if (s.includes('previous') || s.includes('mu-med')) return 'Prev. Exam';
        if (s.includes('lecture')) return 'Lecture Q';
        return src ? src.split('/')[0].trim().substring(0, 20) : '—';
    }

    function buildDeck() {
        let cards = safeAllQuestions.slice();
        if (filterLecture) cards = cards.filter(c => c.lecture === filterLecture);
        if (filterSource) cards = cards.filter(c => sourceGroup(c.source) === filterSource);
        if (shuffleMode) cards = shuffleArray(cards);
        return cards;
    }

    function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function loadDeck(keepIdx = false) {
        deck = buildDeck();
        if (!keepIdx) idx = 0;
        else idx = Math.min(idx, Math.max(0, deck.length - 1));
        updateTitle(); updateMeta(); renderCard(); updateNav();
    }

    function renderCard() {
        const stage = document.getElementById('card-stage');
        if (!deck.length) {
            stage.innerHTML = `<div class="empty-state"><h3>No questions found</h3><button class="btn-primary" onclick="clearFilters()">Clear Filters</button></div>`;
            document.getElementById('prog-fill').style.width = '0%';
            return;
        }

        const c = deck[idx];
        const answered = mcqAnswers[c.id];
        const letters = ['A','B','C','D','E','F'];

        const choicesHTML = (c.choices || []).map((ch, i) => {
            const l = letters[i];
            let cls = 'choice-btn';
            if (answered) {
                cls += ' locked';
                if (l === c.ans) cls += ' correct-answer';
                else if (l === answered) cls += ' wrong-answer';
            }
            return `<button class="${cls}" onclick="pickAnswer('${c.id}','${l}','${c.ans}')"><span class="choice-letter">${l}</span><span>${esc(ch)}</span></button>`;
        }).join('');

        let resultHTML = '';
        if (answered) {
            resultHTML = answered === c.ans ? `<div class="result-banner correct">✓ Correct!</div>` : `<div class="result-banner wrong">✗ Incorrect — correct answer: <strong>${c.ans}</strong></div>`;
        }

        stage.innerHTML = `
            <div class="question-card">
                <div class="card-header"><span class="card-qnum">${esc(c.num)}</span><span class="card-source">${sourceLabel(c.source)}</span><span class="card-lecture">${esc(c.lecture)}</span></div>
                <div class="card-stem">${esc(c.q)}</div>
                <div class="choices">${choicesHTML}</div>
                ${resultHTML}
            </div>`;
        
        document.getElementById('prog-fill').style.width = Math.round(((idx + 1) / deck.length) * 100) + '%';
    }

    window.pickAnswer = function(cardId, chosen, correct) {
        if (mcqAnswers[cardId]) return;
        mcqAnswers[cardId] = chosen;
        if (chosen === correct) sessionCorrect++; else sessionWrong++;
        updateScore(); renderCard(); scheduleSave();
    };

    window.nextCard = function() { if (idx < deck.length - 1) { idx++; renderCard(); updateNav(); scheduleSave(); } };
    window.prevCard = function() { if (idx > 0) { idx--; renderCard(); updateNav(); scheduleSave(); } };

    function updateNav() {
        document.getElementById('btn-prev').disabled = idx <= 0;
        document.getElementById('btn-next').disabled = idx >= deck.length - 1;
        document.getElementById('nav-ctr').textContent = deck.length ? `${idx + 1} / ${deck.length}` : '— / —';
    }

    function updateScore() {
        document.getElementById('score-c').textContent = sessionCorrect;
        document.getElementById('score-w').textContent = sessionWrong;
        const wrongCount = Object.entries(mcqAnswers).filter(([id, ans]) => {
            const c = safeAllQuestions.find(q => q.id === id); return c && ans !== c.ans;
        }).length;
        document.getElementById('btn-wrong').textContent = `✗ Wrong${wrongCount ? ' ('+wrongCount+')' : ''}`;
    }

    function updateTitle() { document.getElementById('deck-title').textContent = (filterLecture || 'All Questions') + (filterSource ? ' · ' + filterSource : ''); }
    function updateMeta() { document.getElementById('deck-meta').textContent = `${deck.length} questions`; }

    window.setSource = function(btn, src) { filterSource = src; document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === src)); loadDeck(); scheduleSave(); };
    window.setOrder = function(btn, order) {
        shuffleMode = order === 'random';
        document.querySelectorAll('[data-order]').forEach(b => b.classList.toggle('active', b.dataset.order === order));
        const shuffleBtn = document.getElementById('btn-shuffle');
        shuffleBtn.classList.toggle('shuffle-on', shuffleMode); shuffleBtn.textContent = shuffleMode ? '⇌ Shuffle ON' : '⇌ Shuffle OFF';
        loadDeck(); scheduleSave();
    };
    window.toggleShuffle = function(btn) { window.setOrder(null, shuffleMode ? 'sequential' : 'random'); };
    window.clearFilters = function() { filterLecture = null; filterSource = ''; document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === '')); buildSidebar(); loadDeck(); scheduleSave(); };

    function buildSidebar() {
        const list = document.getElementById('sb-list');
        const lectures = [...new Set(safeAllQuestions.map(c => c.lecture))].sort();
        const counts = {}; safeAllQuestions.forEach(c => counts[c.lecture] = (counts[c.lecture] || 0) + 1);
        let html = `<li class="sb-item sb-all ${!filterLecture ? 'active' : ''}" onclick="selectLecture(null)"><span class="sb-item-name">All Lectures</span><span class="sb-item-cnt">${safeAllQuestions.length}</span></li>`;
        lectures.forEach(lec => { html += `<li class="sb-item ${filterLecture === lec ? 'active' : ''}" onclick="selectLecture('${esc(lec)}')"><span class="sb-item-name">${esc(lec)}</span><span class="sb-item-cnt">${counts[lec]}</span></li>`; });
        list.innerHTML = html;
    }

    window.selectLecture = function(lec) { filterLecture = lec; buildSidebar(); loadDeck(); if (window.innerWidth < 768) closeSidebar(); scheduleSave(); };
    window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-backdrop').classList.toggle('open'); };
    window.closeSidebar = function() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-backdrop').classList.remove('open'); };

    window.showWrongPanel = function() {
        const wrongCards = safeAllQuestions.filter(c => mcqAnswers[c.id] && mcqAnswers[c.id] !== c.ans);
        const body = document.getElementById('wrong-panel-body');
        if (!wrongCards.length) {
            body.innerHTML = `<div class="wq-empty">🎉 No wrong answers yet — keep going!</div>`;
            document.getElementById('practice-wrong-btn').style.display = 'none';
        } else {
            document.getElementById('practice-wrong-btn').style.display = 'block';
            document.getElementById('practice-wrong-btn').textContent = `Practice ${wrongCards.length} Wrong`;
            let html = `<div class="section-title">Wrong Questions (${wrongCards.length})</div>`;
            wrongCards.forEach(c => {
                const your = c.choices[(mcqAnswers[c.id] || 'A').charCodeAt(0) - 65] || mcqAnswers[c.id];
                const correct = c.choices[(c.ans || 'A').charCodeAt(0) - 65] || c.ans;
                html += `<div class="wq-item" onclick="goToCard('${c.id}')"><div class="wq-meta"><span class="wq-num">${esc(c.num)}</span><span class="wq-lec">${esc(c.lecture)}</span></div><div class="wq-stem">${esc(c.q.substring(0,100))}...</div><div class="wq-answers"><span class="wq-your">✗ ${mcqAnswers[c.id]}) ${esc(your.substring(0,40))}</span><span class="wq-correct">✓ ${c.ans}) ${esc(correct.substring(0,40))}</span></div></div>`;
            });
            body.innerHTML = html;
        }
        document.getElementById('wrong-overlay').classList.add('visible');
    };

    window.closeWrongPanel = function() { document.getElementById('wrong-overlay').classList.remove('visible'); };
    window.practiceWrong = function() {
        const wrongCards = safeAllQuestions.filter(c => mcqAnswers[c.id] && mcqAnswers[c.id] !== c.ans);
        if (!wrongCards.length) return;
        wrongCards.forEach(c => delete mcqAnswers[c.id]);
        deck = shuffleMode ? shuffleArray(wrongCards) : wrongCards;
        idx = 0; filterLecture = null; filterSource = ''; recalculateSessionScore();
        document.getElementById('deck-title').textContent = `Practice: Wrong Questions`;
        document.getElementById('deck-meta').textContent = `${wrongCards.length} questions`;
        buildSidebar(); closeWrongPanel(); renderCard(); updateNav(); toast('Practicing wrong questions'); scheduleSave();
    };

    window.goToCard = function(cardId) {
        const c = safeAllQuestions.find(q => q.id === cardId); if (!c) return;
        filterLecture = c.lecture; filterSource = ''; deck = buildDeck();
        idx = Math.max(0, deck.findIndex(q => q.id === cardId));
        buildSidebar(); closeWrongPanel(); updateTitle(); updateMeta(); renderCard(); updateNav();
    };

    window.showStats = function() {
        const allAns = Object.keys(mcqAnswers).length, correct = safeAllQuestions.filter(c => mcqAnswers[c.id] === c.ans).length, wrong = allAns - correct;
        const lectures = [...new Set(safeAllQuestions.map(c => c.lecture))].sort();
        let html = `<div class="stats-grid"><div class="stat-box total"><div class="val">${allAns}</div><div class="lbl">Answered</div></div><div class="stat-box correct"><div class="val">${correct}</div><div class="lbl">Correct</div></div><div class="stat-box wrong"><div class="val">${wrong}</div><div class="lbl">Wrong</div></div></div><div class="section-title">By Lecture</div>`;
        lectures.forEach(lec => {
            const lCards = safeAllQuestions.filter(c => c.lecture === lec);
            const lAns = lCards.filter(c => mcqAnswers[c.id]).length, lCor = lCards.filter(c => mcqAnswers[c.id] === c.ans).length;
            const pct = lCards.length ? Math.round(lAns / lCards.length * 100) : 0;
            html += `<div class="lec-bar-row"><span class="lec-bar-name">${esc(lec)}</span><div class="lec-bar-track"><div class="lec-bar-fill" style="width:${pct}%"></div></div><span class="lec-bar-pct">${lCor}/${lCards.length}</span></div>`;
        });
        document.getElementById('stats-body').innerHTML = html;
        document.getElementById('stats-overlay').classList.add('visible');
    };
    window.closeStats = function() { document.getElementById('stats-overlay').classList.remove('visible'); };

    window.clearProgress = function() {
        if (!confirm('Reset all saved progress? This cannot be undone.')) return;
        mcqAnswers = {}; recalculateSessionScore(); closeStats(); loadDeck(); toast('Progress reset');
        localStorage.removeItem(LS_KEY);
        if (window._saveToFirebase) window._saveToFirebase({ mcqAnswers: {}, cleared: true });
    };

    function scheduleSave() {
        setSyncDot('syncing');
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(async () => {
            const dataToSave = { mcqAnswers, filterLecture, filterSource, shuffleMode, idx };
            
            // 1. Save locally instantly
            try { localStorage.setItem(LS_KEY, JSON.stringify(dataToSave)); } catch(e) {}
            
            // 2. Sync to Firebase
            if (window._saveToFirebase) {
                const fbSuccess = await window._saveToFirebase(dataToSave);
                if (!fbSuccess) {
                    // Firebase failed (likely rules issue), but LocalStorage worked
                    setSyncDot('error'); 
                    return; 
                }
            }
            setSyncDot('synced'); 
            setTimeout(() => { if(document.getElementById('sync-dot').className.includes('synced')) setSyncDot(''); }, 3000);
        }, 1000);
    }
    
    function setSyncDot(s) { 
        document.getElementById('sync-dot').className = 'sync-dot ' + s; 
        if(s === 'error') document.getElementById('sync-dot').title = "Cloud Save Failed (Saved Locally)";
    }
    
    function toast(msg) { const e = document.getElementById('toast'); e.textContent = msg; e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 2500); }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    document.addEventListener('keydown', e => {
        if (document.getElementById('main-app').style.display === 'none' || e.target.tagName === 'INPUT') return;
        if (e.code === 'ArrowRight') window.nextCard();
        if (e.code === 'ArrowLeft') window.prevCard();
        const key = e.key.toUpperCase();
        if (['A','B','C','D','E'].includes(key) && deck[idx] && !mcqAnswers[deck[idx].id]) {
            const c = deck[idx], letters = ['A','B','C','D','E'];
            if (letters.indexOf(key) < (c.choices || []).length) window.pickAnswer(c.id, key, c.ans);
        }
    });

    let touchStartX = 0;
    document.getElementById('card-area').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('card-area').addEventListener('touchend', e => {
        if (document.getElementById('main-app').style.display === 'none') return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) { if (dx < 0) window.nextCard(); else window.prevCard(); }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjN5mvWufrfGMW8eDZKAwrVa2dAIt0Yu0",
        authDomain: "obg-e5d67.firebaseapp.com",
        projectId: "obg-e5d67",
        storageBucket: "obg-e5d67.firebasestorage.app",
        messagingSenderId: "575965796689",
        appId: "1:575965796689:web:2d2aea412a04672c275b70"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Share DB functions globally for UI Script
    window._saveToFirebase = async (data) => {
        if (auth.currentUser) {
            try {
                await setDoc(doc(db, "users", auth.currentUser.uid), data, { merge: true });
                return true;
            } catch(e) {
                console.error("Firebase Save Blocked:", e.message);
                return false;
            }
        }
        return false;
    };

    window._loadFromFirebase = async () => {
        if (auth.currentUser) {
            try {
                const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
                return snap.exists() ? snap.data() : null;
            } catch(e) {
                console.error("Firebase Load Blocked:", e.message);
                return null;
            }
        }
        return null;
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("main-app").style.display = "flex";
            if (window.initAppAfterLogin) await window.initAppAfterLogin();
        } else {
            document.getElementById("auth-screen").style.display = "flex";
            document.getElementById("main-app").style.display = "none";
        }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const b = e.submitter; b.textContent = "Logging in...";
        try { await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value); } 
        catch (err) { alert("Login failed: " + err.message); }
        finally { b.textContent = "Sign In"; }
    });

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const b = e.submitter; b.textContent = "Registering...";
        try { await createUserWithEmailAndPassword(auth, document.getElementById("signupEmail").value, document.getElementById("signupPassword").value); } 
        catch (err) { alert("Signup failed: " + err.message); }
        finally { b.textContent = "Register"; }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

    window.toggleAuth = (showSignup) => {
        document.getElementById("login-section").style.display = showSignup ? "none" : "block";
        document.getElementById("signup-section").style.display = showSignup ? "block" : "none";
    };
  </script>
</body>
</html>
