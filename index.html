<!-- Firebase -->
<script type="module">
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjN5mvWufrfGMW8eDZKAwrVa2dAIt0Yu0",
    authDomain: "obg-e5d67.firebaseapp.com",
    projectId: "obg-e5d67",
    storageBucket: "obg-e5d67.firebasestorage.app",
    messagingSenderId: "575965796689",
    appId: "1:575965796689:web:2d2aea412a04672c275b70",
    measurementId: "G-1GG7FJCBJ2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Sign Up
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      alert("Signed up: " + userCredential.user.email);
    } catch (error) {
      alert(error.message);
    }
  });

  // Sign In
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      alert("Signed in: " + userCredential.user.email);
    } catch (error) {
      alert(error.message);
    }
  });

  // Log Out
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    alert("Logged out");
  });

  // Save Progress Example
  async function saveProgress(score) {
    const user = auth.currentUser;
    if (user) {
      await setDoc(doc(db, "progress", user.uid), { score: score });
      alert("Progress saved!");
    }
  }

  // Load Progress Example
  async function loadProgress() {
    const user = auth.currentUser;
    if (user) {
      const docSnap = await getDoc(doc(db, "progress", user.uid));
      if (docSnap.exists()) {
        alert("Progress: " + JSON.stringify(docSnap.data()));
      } else {
        alert("No progress found");
      }
    }
  }
</script>

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: all .25s;
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MOBILE HAMBURGER ─────────────────────────────── */
.hamburger { display: none; }
.sidebar-backdrop {
  display: none;

  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 49;
}

  .sidebar {
    position: fixed;
    left: -var(--sidebar-w);
    top: 0;
    height: 100%;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform .25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop.open { display: block; }
  .hamburger { display: flex; }
  .card-area { padding: 16px 14px; }
  .card-stem { font-size: 14.5px; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .lec-bar-name { width: 120px; }
}

/* ── SYNC INDICATOR ─────────────────────────────── */
.sync-dot {
  width: 7px;

  transition: background .3s;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── SHUFFLE ACTIVE ─────────────────────────────── */
.btn-icon.shuffle-on { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }

<body>

    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign In</button>

  <h2>Sign Up</h2>
  <form id="signupForm">
    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>

  <button id="logoutBtn">Log Out</button>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">MU-MED 40 · OBG</div>
      <div class="sb-title">Question Bank</div>
      <div class="sb-count" id="sb-total-count">716 MCQs · 14 Lectures</div>
    </div>
    <div class="sb-scroll">
      <div class="sb-section-label">Lectures</div>
      <ul id="sb-list" style="list-style:none"></ul>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn-icon hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="deck-title">All Questions</div>
      <div class="topbar-meta" id="deck-meta">—</div>
      <button class="btn-icon" onclick="toggleShuffle(this)" id="btn-shuffle" title="Shuffle">⇌ Shuffle</button>
      <button class="btn-icon" onclick="showWrongPanel()" id="btn-wrong" title="Review wrong answers">✗ Wrong</button>
      <button class="btn-icon" onclick="showStats()" title="Statistics">◎ Stats</button>
      <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <span class="filter-label">Source:</span>
      <button class="filter-btn active" data-src="" onclick="setSource(this,'')">All</button>
      <button class="filter-btn" data-src="Old Formatives" onclick="setSource(this,'Old Formatives')">Old Form.</button>
      <button class="filter-btn" data-src="New Formatives" onclick="setSource(this,'New Formatives')">New Form.</button>
      <button class="filter-btn" data-src="Previous Exams" onclick="setSource(this,'Previous Exams')">Prev. Exam</button>
      <div class="filter-sep"></div>
      <span class="filter-label">Order:</span>
      <button class="filter-btn active" data-order="random" onclick="setOrder(this,'random')">Random</button>
      <button class="filter-btn" data-order="sequential" onclick="setOrder(this,'sequential')">Sequential</button>
    </div>

    <!-- PROGRESS -->
    <div class="progress-strip"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

    <!-- CARD AREA -->
    <div class="card-area" id="card-area">
      <div id="card-stage"></div>
    </div>

    <!-- NAV FOOTER -->
    <div class="nav-footer">
      <button class="nav-btn" id="btn-prev" onclick="prevCard()" disabled>← Prev</button>
      <div class="nav-counter" id="nav-ctr">— / —</div>
      <button class="nav-btn" id="btn-next" onclick="nextCard()" disabled>Next →</button>
      <div class="nav-spacer"></div>
      <div class="nav-score" id="nav-score">
        <span class="score-correct" id="score-c">0</span> correct ·
        <span class="score-wrong" id="score-w">0</span> wrong
      </div>
    </div>

  </div>
</div>

<!-- WRONG ANSWERS PANEL -->
<div class="overlay" id="wrong-overlay">
  <div class="panel">
    <div class="panel-header">
      <h2>Wrong Answers Review</h2>
      <button class="panel-close" onclick="closeWrongPanel()">×</button>
    </div>
    <div class="panel-body" id="wrong-panel-body"></div>
    <div class="panel-footer">
      <button class="btn-icon" onclick="closeWrongPanel()">Close</button>
      <button class="btn-primary" id="practice-wrong-btn" onclick="practiceWrong()">Practice Wrong</button>
    </div>
  </div>
</div>

<!-- STATS PANEL -->
<div class="overlay" id="stats-overlay">
  <div class="panel">
    <div class="panel-header">
      <h2>Progress Statistics</h2>
      <button class="panel-close" onclick="closeStats()">×</button>
    </div>
    <div class="panel-body" id="stats-body"></div>
    <div class="panel-footer">
      <button class="btn-icon" style="color:var(--red);border-color:var(--red)" onclick="clearProgress()">Reset Progress</button>
      <button class="btn-primary" onclick="closeStats()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- QUESTION DATA -->
<script src="questions_data.js"></script>

<script>
// ── STATE ──────────────────────────────────────────
let deck = [];
let idx = 0;
let shuffleMode = true;
let filterLecture = null;
let filterSource = '';
let mcqAnswers = {}; // id -> chosen letter
let sessionCorrect = 0;
let sessionWrong = 0;
let syncTimeout = null;

// ── SOURCE HELPERS ──────────────────────────────────────────
function sourceGroup(src) {
  const s = String(src || '').toLowerCase();
  if (s.includes('new formative')) return 'New Formatives';
  if (s.includes('old formative')) return 'Old Formatives';
  if (s.includes('previous exam') || s.includes('prev exam') || s.includes('mu-med')) return 'Previous Exams';
  return '';
}

function sourceLabel(src) {
  const s = String(src || '').toLowerCase();
  if (s.includes('new formative')) return 'New Form.';
  if (s.includes('old formative')) return 'Old Form.';
  if (s.includes('previous exam') || s.includes('mu-med')) return 'Prev. Exam';
  if (s.includes('lecture')) return 'Lecture Q';
  return src ? src.split('/')[0].trim().substring(0, 20) : '—';
}

// ── BUILD DECK ──────────────────────────────────────────
function buildDeck() {
  let cards = ALL_QUESTIONS.slice();
  if (filterLecture) cards = cards.filter(c => c.lecture === filterLecture);
  if (filterSource) cards = cards.filter(c => sourceGroup(c.source) === filterSource);
  if (shuffleMode) cards = shuffle(cards);
  return cards;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadDeck(keepIdx = false) {
  const newDeck = buildDeck();
  deck = newDeck;
  if (!keepIdx) idx = 0;
  else idx = Math.min(idx, deck.length - 1);
  sessionCorrect = 0;
  sessionWrong = 0;
  updateTitle();
  updateMeta();
  renderCard();
  updateNav();
  updateScore();
}

// ── RENDER ──────────────────────────────────────────
function renderCard() {
  const stage = document.getElementById('card-stage');
  if (!deck.length) {
    stage.innerHTML = `<div class="empty-state"><h3>No questions found</h3><p>Try changing your filters.</p><button class="btn-primary" onclick="clearFilters()">Clear Filters</button></div>`;
    updateProgress(0, 0);
    return;
  }

  const c = deck[idx];
  const answered = mcqAnswers[c.id];
  const letters = ['A','B','C','D','E','F'];

  const choicesHTML = (c.choices || []).map((ch, i) => {
    const l = letters[i];
    let cls = 'choice-btn';
    if (answered) {
      cls += ' locked';
      if (l === c.ans) cls += ' correct-answer';
      else if (l === answered) cls += ' wrong-answer';
    }
    return `<button class="${cls}" onclick="pick('${c.id}','${l}','${c.ans}')">
      <span class="choice-letter">${l}</span>
      <span>${esc(ch)}</span>
    </button>`;
  }).join('');

  let resultHTML = '';
  if (answered) {
    if (answered === c.ans) {
      resultHTML = `<div class="result-banner correct">✓ Correct!</div>`;
    } else {
      resultHTML = `<div class="result-banner wrong">✗ Incorrect — correct answer: <strong>${c.ans}</strong></div>`;
    }
  }

  let noteHTML = '';
  if (c.note && answered) {
    noteHTML = `<div class="card-note-inline show">📝 ${esc(c.note)}</div>`;
  }

  stage.innerHTML = `<div class="question-card">
    <div class="card-header">
      <span class="card-qnum">${esc(c.num)}</span>
      <span class="card-source">${sourceLabel(c.source)}</span>
      <span class="card-lecture">${esc(c.lecture)}</span>
    </div>
    <div class="card-stem">${esc(c.q)}</div>
    <div class="choices">${choicesHTML}</div>
    ${resultHTML}
    ${noteHTML}
  </div>`;

  updateProgress(idx + 1, deck.length);
}

function pick(cardId, chosen, correct) {
  if (mcqAnswers[cardId]) return; // already answered
  mcqAnswers[cardId] = chosen;
  if (chosen === correct) sessionCorrect++;
  else sessionWrong++;
  updateScore();
  renderCard();
  scheduleSave();
}

// ── NAVIGATION ──────────────────────────────────────────
function nextCard() {
  if (idx < deck.length - 1) { idx++; renderCard(); updateNav(); }
}
function prevCard() {
  if (idx > 0) { idx--; renderCard(); updateNav(); }
}
function updateNav() {
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= deck.length - 1;
  document.getElementById('nav-ctr').textContent = deck.length ? `${idx + 1} / ${deck.length}` : '— / —';
}
function updateProgress(cur, total) {
  const pct = total ? Math.round(cur / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}
function updateScore() {
  document.getElementById('score-c').textContent = sessionCorrect;
  document.getElementById('score-w').textContent = sessionWrong;
  // update wrong button badge
  const wrong = Object.entries(mcqAnswers).filter(([id, ans]) => {
    const c = ALL_QUESTIONS.find(q => q.id === id);
    return c && ans !== c.ans;
  });
  document.getElementById('btn-wrong').textContent = `✗ Wrong${wrong.length ? ' ('+wrong.length+')' : ''}`;
}
function updateTitle() {
  const title = filterLecture || 'All Questions';
  document.getElementById('deck-title').textContent = title + (filterSource ? ' · ' + filterSource : '');
}
function updateMeta() {
  document.getElementById('deck-meta').textContent = `${deck.length} questions`;
}

// ── FILTERS ──────────────────────────────────────────
function setSource(btn, src) {
  filterSource = src;
  document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === src));
  loadDeck();
}
function setOrder(btn, order) {
  shuffleMode = order === 'random';
  document.querySelectorAll('[data-order]').forEach(b => b.classList.toggle('active', b.dataset.order === order));
  loadDeck();
}
function toggleShuffle(btn) {
  shuffleMode = !shuffleMode;
  btn.classList.toggle('shuffle-on', shuffleMode);
  btn.textContent = shuffleMode ? '⇌ Shuffle ON' : '⇌ Shuffle OFF';
  // sync order buttons
  document.querySelectorAll('[data-order]').forEach(b => b.classList.toggle('active', b.dataset.order === (shuffleMode ? 'random' : 'sequential')));
  loadDeck();
}
function clearFilters() {
  filterLecture = null;
  filterSource = '';
  document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === ''));
  buildSidebar();
  loadDeck();
}

// ── SIDEBAR ──────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('sb-list');
  const lectures = [...new Set(ALL_QUESTIONS.map(c => c.lecture))].sort();
  const counts = {};
  ALL_QUESTIONS.forEach(c => { counts[c.lecture] = (counts[c.lecture] || 0) + 1; });

  let html = `<li class="sb-item sb-all ${!filterLecture ? 'active' : ''}" onclick="selectLecture(null)">
    <span class="sb-item-name">All Lectures</span>
    <span class="sb-item-cnt">${ALL_QUESTIONS.length}</span>
  </li>`;

  lectures.forEach(lec => {
    const active = filterLecture === lec;
    html += `<li class="sb-item ${active ? 'active' : ''}" onclick="selectLecture('${esc(lec)}')">
      <span class="sb-item-name">${esc(lec)}</span>
      <span class="sb-item-cnt">${counts[lec] || 0}</span>
    </li>`;
  });
  list.innerHTML = html;
}

function selectLecture(lec) {
  filterLecture = lec;
  buildSidebar();
  loadDeck();
  if (window.innerWidth < 768) closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

// ── WRONG ANSWERS ──────────────────────────────────────────
function showWrongPanel() {
  const wrongCards = ALL_QUESTIONS.filter(c => mcqAnswers[c.id] && mcqAnswers[c.id] !== c.ans);
  const body = document.getElementById('wrong-panel-body');

  if (!wrongCards.length) {
    body.innerHTML = `<div class="wq-empty">🎉 No wrong answers yet — keep going!</div>`;
    document.getElementById('practice-wrong-btn').disabled = true;
    document.getElementById('practice-wrong-btn').textContent = 'No Wrong Answers';
  } else {
    document.getElementById('practice-wrong-btn').disabled = false;
    document.getElementById('practice-wrong-btn').textContent = `Practice ${wrongCards.length} Wrong Question${wrongCards.length > 1 ? 's' : ''}`;

    // Group by lecture
    const byLecture = {};
    wrongCards.forEach(c => {
      if (!byLecture[c.lecture]) byLecture[c.lecture] = [];
      byLecture[c.lecture].push(c);
    });

    let html = `<div class="stats-grid">
      <div class="stat-box wrong"><div class="val">${wrongCards.length}</div><div class="lbl">Wrong</div></div>
      <div class="stat-box correct"><div class="val">${Object.keys(mcqAnswers).length - wrongCards.length}</div><div class="lbl">Correct</div></div>
      <div class="stat-box total"><div class="val">${Object.keys(mcqAnswers).length}</div><div class="lbl">Answered</div></div>
    </div>`;

    html += `<div class="section-title">Wrong Questions (${wrongCards.length})</div>`;

    wrongCards.forEach(c => {
      const your = c.choices[(mcqAnswers[c.id] || 'A').charCodeAt(0) - 65] || mcqAnswers[c.id];
      const correct = c.choices[(c.ans || 'A').charCodeAt(0) - 65] || c.ans;
      const stem = c.q.length > 120 ? c.q.substring(0, 120) + '…' : c.q;
      html += `<div class="wq-item" onclick="goToCard('${c.id}')">
        <div class="wq-meta">
          <span class="wq-num">${esc(c.num)}</span>
          <span class="wq-lec">${esc(c.lecture)}</span>
        </div>
        <div class="wq-stem">${esc(stem)}</div>
        <div class="wq-answers">
          <span class="wq-your">✗ ${mcqAnswers[c.id]}) ${esc(your.substring(0, 50))}</span>
          <span class="wq-correct">✓ ${c.ans}) ${esc(correct.substring(0, 50))}</span>
        </div>
      </div>`;
    });
    body.innerHTML = html;
  }
  document.getElementById('wrong-overlay').classList.add('visible');
}

function closeWrongPanel() {
  document.getElementById('wrong-overlay').classList.remove('visible');
}

function practiceWrong() {
  const wrongCards = ALL_QUESTIONS.filter(c => mcqAnswers[c.id] && mcqAnswers[c.id] !== c.ans);
  if (!wrongCards.length) return;
  // Reset answers for wrong cards so they can be re-answered
  wrongCards.forEach(c => delete mcqAnswers[c.id]);
  deck = shuffleMode ? shuffle(wrongCards) : wrongCards;
  idx = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  filterLecture = null;
  filterSource = '';
  document.getElementById('deck-title').textContent = `Practice: ${wrongCards.length} Wrong Questions`;
  document.getElementById('deck-meta').textContent = `${wrongCards.length} questions`;
  buildSidebar();
  closeWrongPanel();
  renderCard(); updateNav(); updateScore();
  toast('Practicing ' + wrongCards.length + ' wrong question' + (wrongCards.length > 1 ? 's' : ''));
  scheduleSave();
}

function goToCard(cardId) {
  const c = ALL_QUESTIONS.find(q => q.id === cardId);
  if (!c) return;
  // Load the lecture containing this card
  filterLecture = c.lecture;
  filterSource = '';
  deck = buildDeck();
  const di = deck.findIndex(q => q.id === cardId);
  idx = di !== -1 ? di : 0;
  buildSidebar();
  closeWrongPanel();
  updateTitle(); updateMeta();
  renderCard(); updateNav(); updateScore();
}

// ── STATS ──────────────────────────────────────────
function showStats() {
  const allAnswered = Object.keys(mcqAnswers).length;
  const correct = ALL_QUESTIONS.filter(c => mcqAnswers[c.id] === c.ans).length;
  const wrong = allAnswered - correct;
  const lectures = [...new Set(ALL_QUESTIONS.map(c => c.lecture))].sort();

  let html = `<div class="stats-grid">
    <div class="stat-box total"><div class="val">${allAnswered}</div><div class="lbl">Answered</div></div>
    <div class="stat-box correct"><div class="val">${correct}</div><div class="lbl">Correct</div></div>
    <div class="stat-box wrong"><div class="val">${wrong}</div><div class="lbl">Wrong</div></div>
  </div>`;

  html += `<div class="section-title">By Lecture</div>`;
  lectures.forEach(lec => {
    const lCards = ALL_QUESTIONS.filter(c => c.lecture === lec);
    const lAns = lCards.filter(c => mcqAnswers[c.id]).length;
    const lCorrect = lCards.filter(c => mcqAnswers[c.id] === c.ans).length;
    const pct = lCards.length ? Math.round(lAns / lCards.length * 100) : 0;
    html += `<div class="lec-bar-row">
      <span class="lec-bar-name" title="${esc(lec)}">${esc(lec)}</span>
      <div class="lec-bar-track"><div class="lec-bar-fill" style="width:${pct}%"></div></div>
      <span class="lec-bar-pct">${lCorrect}/${lCards.length}</span>
    </div>`;
  });

  document.getElementById('stats-body').innerHTML = html;
  document.getElementById('stats-overlay').classList.add('visible');
}
function closeStats() { document.getElementById('stats-overlay').classList.remove('visible'); }

// ── PROGRESS SAVE/LOAD ──────────────────────────────────────────
const LS_KEY = 'obg_progress_v2';

function getProgressData() {
  return { mcqAnswers, filterLecture, filterSource, shuffleMode, idx };
}

function scheduleSave() {
  setSyncDot('syncing');
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    const data = getProgressData();
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(e) {}
    if (window._saveToFirebase) {
      await window._saveToFirebase(data);
    }
    setSyncDot('synced');
    setTimeout(() => setSyncDot(''), 3000);
  }, 1000);
}

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  dot.title = state === 'synced' ? 'Saved' : state === 'syncing' ? 'Saving…' : state === 'error' ? 'Save failed' : 'Sync';
}

async function loadProgress() {
  let data = null;

  // Try Firebase first
  if (window._loadFromFirebase) {
    try {
      data = await window._loadFromFirebase();
    } catch(e) {}
  }

  // Fallback to localStorage
  if (!data) {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) data = JSON.parse(raw);
    } catch(e) {}
  }

  if (data) {
    mcqAnswers = data.mcqAnswers || {};
    filterLecture = data.filterLecture || null;
    filterSource = data.filterSource || '';
    shuffleMode = data.shuffleMode !== undefined ? data.shuffleMode : true;
    const savedIdx = data.idx || 0;

    // sync UI
    document.querySelectorAll('[data-src]').forEach(b => b.classList.toggle('active', b.dataset.src === filterSource));
    document.querySelectorAll('[data-order]').forEach(b => b.classList.toggle('active', b.dataset.order === (shuffleMode ? 'random' : 'sequential')));
    const shuffleBtn = document.getElementById('btn-shuffle');
    if (shuffleBtn) { shuffleBtn.classList.toggle('shuffle-on', shuffleMode); shuffleBtn.textContent = shuffleMode ? '⇌ Shuffle ON' : '⇌ Shuffle OFF'; }

    buildSidebar();
    deck = buildDeck();
    idx = Math.min(savedIdx, Math.max(0, deck.length - 1));
    updateTitle(); updateMeta();
  } else {
    buildSidebar();
    deck = buildDeck();
  }

  renderCard(); updateNav(); updateScore();
}

function clearProgress() {
  if (!confirm('Reset all saved progress? This cannot be undone.')) return;
  mcqAnswers = {};
  sessionCorrect = 0;
  sessionWrong = 0;
  localStorage.removeItem(LS_KEY);
  if (window._saveToFirebase) window._saveToFirebase({ mcqAnswers: {}, cleared: true });
  closeStats();
  loadDeck();
  toast('Progress reset');
}

// ── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'ArrowRight') nextCard();
  if (e.code === 'ArrowLeft') prevCard();
  // A-E to pick answer
  const key = e.key.toUpperCase();
  if (['A','B','C','D','E'].includes(key) && deck[idx] && !mcqAnswers[deck[idx].id]) {
    const c = deck[idx];
    const letters = ['A','B','C','D','E'];
    if (letters.indexOf(key) < (c.choices || []).length) {
      pick(c.id, key, c.ans);
    }
  }
});

// ── SWIPE ──────────────────────────────────────────
let touchStartX = 0;
document.getElementById('card-area').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('card-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) { if (dx < 0) nextCard(); else prevCard(); }
});

// ── HELPERS ──────────────────────────────────────────
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────
loadProgress();
window.addEventListener('pagehide', () => {
  const data = getProgressData();
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
});
</script>
</body>
</html>
