<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBG Question Bank — MU-MED 40</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #1c2330;
            --border: #30363d; --border2: #21262d;
            --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --teal: #2dd4bf; --teal-dim: rgba(45,212,191,0.12);
            --teal-dim2: rgba(45,212,191,0.06);
            --red: #f87171; --red-dim: rgba(248,113,113,0.12);
            --green: #4ade80; --green-dim: rgba(74,222,128,0.12);
            --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,0.1);
            --mono: 'DM Mono', monospace; --sans: 'Sora', sans-serif;
            --sidebar-w: 260px; --header-h: 56px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; overflow: hidden; }

        /* --- AUTH SCREEN --- */
        .auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); z-index: 1000; position: relative; }
        .auth-card { background: var(--bg2); padding: 32px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-card h2 { margin-bottom: 24px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .auth-card button { width: 100%; padding: 12px; background: var(--teal); color: var(--bg); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .auth-toggle { margin-top: 20px; text-align: center; font-size: 13px; color: var(--teal); cursor: pointer; text-decoration: underline; }

        /* --- APP LAYOUT --- */
        .app { display: none; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border2); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .sb-header { padding: 16px; border-bottom: 1px solid var(--border2); }
        .sb-logo { font-family: var(--mono); font-size: 11px; color: var(--teal); letter-spacing: .12em; text-transform: uppercase; }
        .sb-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
        .sb-item { display: flex; justify-content: space-between; padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 2px solid transparent; }
        .sb-item:hover { background: var(--bg3); }
        .sb-item.active { background: var(--teal-dim2); border-left-color: var(--teal); color: var(--text); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: var(--header-h); background: var(--bg2); border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        .topbar-title { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-icon { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-icon:hover { border-color: var(--teal); color: var(--teal); }

        .card-area { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .question-card { width: 100%; max-width: 700px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
        .card-header { padding: 12px 20px; background: var(--bg3); display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); }
        .card-stem { padding: 20px; font-size: 16px; font-weight: 500; line-height: 1.6; }
        .choices { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text2); cursor: pointer; text-align: left; }
        .choice-btn.locked { cursor: default; }
        .choice-btn.correct-answer { border-color: var(--green); background: var(--green-dim); color: var(--text); }
        .choice-btn.wrong-answer { border-color: var(--red); background: var(--red-dim); color: var(--text); }
        .choice-letter { font-family: var(--mono); background: var(--bg2); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        .nav-footer { padding: 15px 20px; background: var(--bg2); border-top: 1px solid var(--border2); display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .overlay.visible { display: flex; }
        .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
        .panel-body { padding: 20px; overflow-y: auto; flex: 1; }
        
        .wq-item { background: var(--bg3); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--red); }
        .wq-stem { font-size: 13px; margin-bottom: 5px; }
        .wq-ans { font-size: 11px; color: var(--green); font-family: var(--mono); }

        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
        .sync-dot.syncing { background: var(--yellow); }
        .sync-dot.synced { background: var(--green); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-card" id="login-section">
            <h2>MU-MED 40 Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <div class="auth-toggle" onclick="toggleAuth(true)">New here? Create account</div>
        </div>
        <div class="auth-card" id="signup-section" style="display:none;">
            <h2>Create Account</h2>
            <form id="signupForm">
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <div class="auth-toggle" onclick="toggleAuth(false)">Have an account? Login</div>
        </div>
    </div>

    <div class="app" id="main-app">
        <aside class="sidebar">
            <div class="sb-header"><div class="sb-logo">Question Bank</div></div>
            <div class="sb-scroll" id="sb-list"></div>
        </aside>
        <main class="main">
            <div class="topbar">
                <div class="topbar-title" id="deck-title">All Questions</div>
                <button class="btn-icon" onclick="showWrongPanel()">✗ Wrong</button>
                <button class="btn-icon" onclick="showStats()">◎ Stats</button>
                <button class="btn-icon" id="logoutBtn" style="color:var(--red)">Logout</button>
                <div class="sync-dot" id="sync-dot"></div>
            </div>
            <div class="card-area" id="card-area">
                <div id="card-stage"></div>
            </div>
            <footer class="nav-footer">
                <button class="nav-btn" id="btn-prev" onclick="prevCard()">← Prev</button>
                <div id="nav-ctr">0 / 0</div>
                <button class="nav-btn" id="btn-next" onclick="nextCard()">Next →</button>
                <div style="margin-left:auto">Correct: <span id="score-c" style="color:var(--green)">0</span></div>
            </footer>
        </main>
    </div>

    <div class="overlay" id="wrong-overlay">
        <div class="panel">
            <div class="panel-body" id="wrong-panel-body"></div>
            <div style="padding:15px; border-top:1px solid var(--border2); display:flex; gap:10px;">
                <button class="nav-btn" onclick="closeWrongPanel()">Close</button>
                <button class="nav-btn" style="background:var(--teal); color:black" onclick="practiceWrong()">Practice These</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="stats-overlay">
        <div class="panel">
            <div class="panel-body" id="stats-body"></div>
            <div style="padding:15px; border-top:1px solid var(--border2)">
                <button class="nav-btn" onclick="closeStats()">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjN5mvWufrfGMW8eDZKAwrVa2dAIt0Yu0",
            authDomain: "obg-e5d67.firebaseapp.com",
            projectId: "obg-e5d67",
            storageBucket: "obg-e5d67.firebasestorage.app",
            messagingSenderId: "575965796689",
            appId: "1:575965796689:web:2d2aea412a04672c275b70"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("main-app").style.display = "flex";
                await loadProgress();
            } else {
                document.getElementById("auth-screen").style.display = "flex";
                document.getElementById("main-app").style.display = "none";
            }
        });

        document.getElementById("loginForm").onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value).catch(a => alert(a.message));
        };

        document.getElementById("signupForm").onsubmit = (e) => {
            e.preventDefault();
            createUserWithEmailAndPassword(auth, document.getElementById("signupEmail").value, document.getElementById("signupPassword").value).catch(a => alert(a.message));
        };

        document.getElementById("logoutBtn").onclick = () => signOut(auth);

        window._saveToFirebase = async (data) => {
            if (auth.currentUser) await setDoc(doc(db, "users", auth.currentUser.uid), data, { merge: true });
        };

        window._loadFromFirebase = async () => {
            if (auth.currentUser) {
                const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
                return snap.exists() ? snap.data() : null;
            }
        };

        window.toggleAuth = (s) => {
            document.getElementById("login-section").style.display = s ? "none" : "block";
            document.getElementById("signup-section").style.display = s ? "block" : "none";
        };
    </script>

    <script src="questions_data.js"></script>
    <script>
        let deck = [], idx = 0, mcqAnswers = {}, filterLec = null;

        function buildDeck() {
            let cards = (window.ALL_QUESTIONS || []).slice();
            if (filterLec) cards = cards.filter(c => c.lecture === filterLec);
            return cards;
        }

        function renderCard() {
            const stage = document.getElementById('card-stage');
            if (!deck.length) { stage.innerHTML = "No questions found."; return; }
            
            const c = deck[idx];
            const answered = mcqAnswers[c.id];
            const letters = ['A','B','C','D','E'];

            const choicesHTML = (c.choices || []).map((ch, i) => {
                const l = letters[i];
                let cls = "choice-btn" + (answered ? " locked" : "");
                if (answered && l === c.ans) cls += " correct-answer";
                if (answered && l === answered && l !== c.ans) cls += " wrong-answer";
                return `<button class="${cls}" onclick="pick('${c.id}','${l}','${c.ans}')"><span class="choice-letter">${l}</span><span>${ch}</span></button>`;
            }).join('');

            stage.innerHTML = `
                <div class="question-card">
                    <div class="card-header"><span>${c.num}</span><span>${c.lecture}</span></div>
                    <div class="card-stem">${c.q}</div>
                    <div class="choices">${choicesHTML}</div>
                </div>`;
            
            document.getElementById('nav-ctr').textContent = `${idx + 1} / ${deck.length}`;
            document.getElementById('btn-prev').disabled = idx === 0;
            document.getElementById('btn-next').disabled = idx === deck.length - 1;
        }

        function pick(id, l, ans) {
            if (mcqAnswers[id]) return;
            mcqAnswers[id] = l;
            renderCard();
            updateScore();
            if (window._saveToFirebase) window._saveToFirebase({ mcqAnswers, idx });
        }

        function updateScore() {
            const correct = Object.keys(mcqAnswers).filter(id => {
                const q = ALL_QUESTIONS.find(x => x.id === id);
                return q && mcqAnswers[id] === q.ans;
            }).length;
            document.getElementById('score-c').textContent = correct;
        }

        function nextCard() { if (idx < deck.length - 1) { idx++; renderCard(); } }
        function prevCard() { if (idx > 0) { idx--; renderCard(); } }

        // --- WRONG & STATS LOGIC ---
        function showWrongPanel() {
            const wrong = ALL_QUESTIONS.filter(q => mcqAnswers[q.id] && mcqAnswers[q.id] !== q.ans);
            const body = document.getElementById('wrong-panel-body');
            body.innerHTML = `<h3>Wrong Answers (${wrong.length})</h3>` + 
                wrong.map(q => `<div class="wq-item"><div class="wq-stem">${q.q}</div><div class="wq-ans">Correct: ${q.ans}</div></div>`).join('');
            document.getElementById('wrong-overlay').classList.add('visible');
        }

        function practiceWrong() {
            const wrong = ALL_QUESTIONS.filter(q => mcqAnswers[q.id] && mcqAnswers[q.id] !== q.ans);
            if (wrong.length) {
                deck = wrong; idx = 0; renderCard(); closeWrongPanel();
                document.getElementById('deck-title').textContent = "Practicing Errors";
            }
        }

        function showStats() {
            const answered = Object.keys(mcqAnswers).length;
            const correct = Object.keys(mcqAnswers).filter(id => {
                const q = ALL_QUESTIONS.find(x => x.id === id);
                return q && mcqAnswers[id] === q.ans;
            }).length;
            document.getElementById('stats-body').innerHTML = `
                <h2>Statistics</h2>
                <p>Total Answered: ${answered}</p>
                <p>Accuracy: ${answered ? Math.round((correct/answered)*100) : 0}%</p>
            `;
            document.getElementById('stats-overlay').classList.add('visible');
        }

        // --- KEYBOARD SUPPORT ---
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('main-app').style.display === "none") return;
            if (e.key === "ArrowRight") nextCard();
            if (e.key === "ArrowLeft") prevCard();
            const keys = {'a':'A','b':'B','c':'C','d':'D','e':'E'};
            if (keys[e.key.toLowerCase()] && deck[idx]) {
                pick(deck[idx].id, keys[e.key.toLowerCase()], deck[idx].ans);
            }
        });

        async function loadProgress() {
            const data = await window._loadFromFirebase();
            if (data) { mcqAnswers = data.mcqAnswers || {}; idx = data.idx || 0; }
            if (window.ALL_QUESTIONS) {
                const lecs = [...new Set(ALL_QUESTIONS.map(q => q.lecture))].sort();
                document.getElementById('sb-list').innerHTML = `<div class="sb-item active" onclick="setLec(null)">All Lectures</div>` + 
                    lecs.map(l => `<div class="sb-item" onclick="setLec('${l}')">${l}</div>`).join('');
            }
            deck = buildDeck();
            renderCard();
            updateScore();
        }

        function setLec(l) { filterLec = l; deck = buildDeck(); idx = 0; renderCard(); }
        function closeWrongPanel() { document.getElementById('wrong-overlay').classList.remove('visible'); }
        function closeStats() { document.getElementById('stats-overlay').classList.remove('visible'); }
    </script>
</body>
</html>
